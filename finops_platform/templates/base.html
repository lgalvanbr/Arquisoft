<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>{% block title %}CloudyNet · FinOps Platform{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box}body{background:#f9f9fa;color:#1a1c1d;font-family:Inter,system-ui,sans-serif}#dashboard{display:none}</style>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{
      "primary":"#006591","on-primary":"#ffffff","primary-container":"#0ea5e9",
      "primary-fixed":"#c9e6ff","primary-fixed-dim":"#89ceff",
      "on-primary-fixed":"#001e2f","on-primary-fixed-variant":"#004c6e",
      "secondary":"#50616b","on-secondary":"#ffffff",
      "secondary-container":"#d3e5f1","on-secondary-container":"#566771",
      "secondary-fixed":"#d3e5f1","secondary-fixed-dim":"#b7c9d5",
      "on-secondary-fixed":"#0c1e26","on-secondary-fixed-variant":"#384953",
      "tertiary":"#635b6e","on-tertiary":"#ffffff",
      "tertiary-container":"#a198ad","tertiary-fixed":"#e9def5",
      "on-tertiary-fixed":"#1e1929","on-tertiary-container":"#373042",
      "error":"#ba1a1a","on-error":"#ffffff",
      "error-container":"#ffdad6","on-error-container":"#93000a",
      "background":"#f9f9fa","on-background":"#1a1c1d",
      "surface":"#f9f9fa","on-surface":"#1a1c1d",
      "surface-variant":"#e2e2e3","on-surface-variant":"#3e4850",
      "surface-tint":"#006591",
      "surface-container-lowest":"#ffffff","surface-container-low":"#f3f3f4",
      "surface-container":"#eeeeef","surface-container-high":"#e8e8e9",
      "surface-container-highest":"#e2e2e3",
      "outline":"#6e7881","outline-variant":"#bec8d2"
    },
    fontFamily:{"body-md":["Inter"],"headline-md":["Inter"]},
    fontSize:{
      "headline-xl":["36px",{lineHeight:"1.2",fontWeight:"600"}],
      "headline-lg":["28px",{lineHeight:"1.3",fontWeight:"600"}],
      "headline-md":["20px",{lineHeight:"1.4",fontWeight:"600"}],
      "body-lg":["16px",{lineHeight:"1.6"}],
      "body-md":["14px",{lineHeight:"1.5"}]
    }
  }}
}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.terminal-scroll::-webkit-scrollbar{width:5px;height:5px}
.terminal-scroll::-webkit-scrollbar-track{background:transparent}
.terminal-scroll::-webkit-scrollbar-thumb{background:#bec8d2;border-radius:4px}
.soft-glow{box-shadow:0 8px 30px rgba(14,165,233,0.06)}
.btn-glass-edge{box-shadow:inset 0 1px 0 rgba(255,255,255,0.2)}
.page{display:none}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.45}}
.pulse-dot{animation:pulse-dot 2s infinite}
#sidebar{transition:transform .25s ease;}
@media(max-width:1023px){#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body class="bg-background min-h-screen font-body-md text-on-background antialiased" style="background:#f9f9fa;color:#1a1c1d">

<!-- CSRF TOKEN -->
{% csrf_token %}

{% block content %}{% endblock %}

<script>
// Utility functions
function switchTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.querySelectorAll('[id^="tab-btn-"]').forEach(btn => btn.classList.remove('bg-surface-container-lowest', 'shadow-sm'));
  document.getElementById(`tab-btn-${tab}`).classList.add('bg-surface-container-lowest', 'shadow-sm');
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('bg-secondary-container', 'text-on-secondary-container'));
  btn.classList.add('bg-secondary-container', 'text-on-secondary-container');
  closeSidebar();
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.remove('open');
  overlay.classList.add('hidden');
}

function setEndpoint(endpoint) {
  document.getElementById('custom-endpoint').value = endpoint;
}

async function fetchEndpoint(endpoint, resultId) {
  const token = localStorage.getItem('access_token');
  try {
    const response = await fetch(endpoint, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await response.json();
    document.getElementById(resultId).textContent = JSON.stringify(data, null, 2);
  } catch (error) {
    document.getElementById(resultId).textContent = `Error: ${error.message}`;
  }
}

function doLogout() {
  localStorage.clear();
  location.reload();
}

// Load user data
function loadUserData() {
  const token = localStorage.getItem('access_token');
  if (!token) {
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  } else {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    fetchEndpoint('/autenticacion/me', 'me-data');
  }
}

document.addEventListener('DOMContentLoaded', loadUserData);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
